<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workout Tracker</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body>

  <!-- ── Header ─────────────────────────────────────────────────────────── -->
  <header>
    <span id="header-title" class="header-title" role="button" tabindex="0">Workout Tracker</span>
    <button id="btn-add-exercise" class="btn-primary">+ Add Exercise</button>
  </header>

  <!-- ── Exercise List View ──────────────────────────────────────────────── -->
  <main id="view-list" class="view">
    <p id="empty-state" class="empty-state" hidden>
      No exercises yet. Add one to get started!
    </p>
    <div id="exercise-grid" class="exercise-grid"></div>
  </main>

  <!-- ── Exercise Detail View ────────────────────────────────────────────── -->
  <main id="view-detail" class="view" hidden>
    <button id="btn-back" class="btn-back">← Back</button>
    <h2 id="detail-title"></h2>
    <p id="detail-range" class="detail-meta"></p>

    <div class="detail-columns">

      <!-- Left: log a set -->
      <section class="card">
        <h3>Log a Set</h3>
        <form id="form-log-set">
          <label>Date
            <input type="date" id="input-date" required />
          </label>
          <label>Weight (lbs)
            <input type="number" id="input-weight" min="0" step="0.5" required />
          </label>
          <label>Reps completed
            <input type="number" id="input-reps" min="1" step="1" required />
          </label>
          <button type="submit" class="btn-primary">Log Set</button>
          <p id="log-feedback" class="feedback" hidden></p>
        </form>
      </section>

      <!-- Right: recommendation -->
      <section class="card recommendation-card">
        <h3>Next Session</h3>
        <div id="rec-content">
          <div class="rec-numbers">
            <span id="rec-weight" class="rec-big">—</span>
            <span class="rec-unit">lbs</span>
            <span class="rec-x">×</span>
            <span id="rec-reps" class="rec-big">—</span>
            <span class="rec-unit">reps</span>
          </div>
          <p id="rec-note" class="rec-note"></p>
        </div>
      </section>

    </div>

    <!-- Strength trend chart -->
    <section class="card chart-card">
      <h3>Strength Trend (Estimated 1RM)</h3>
      <div class="chart-wrapper">
        <canvas id="trend-chart"></canvas>
      </div>
      <p id="chart-empty" class="empty-state" hidden>Log at least one set to see your trend.</p>
    </section>

    <!-- History table -->
    <section class="card">
      <h3>Session History</h3>
      <div id="history-container">
        <p class="empty-state">No sets logged yet.</p>
      </div>
    </section>

  </main>

  <!-- ── Add Exercise Modal ──────────────────────────────────────────────── -->
  <div id="modal-overlay" class="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-heading">
      <h2 id="modal-heading">New Exercise</h2>
      <form id="form-add-exercise">
        <label>Exercise name
          <input type="text" id="input-name" placeholder="e.g. Bench Press" required />
        </label>
        <div class="row-2">
          <label>Min reps
            <input type="number" id="input-low" value="5" min="1" required />
          </label>
          <label>Max reps
            <input type="number" id="input-high" value="8" min="1" required />
          </label>
        </div>
        <label>Weight increment (lbs)
          <input type="number" id="input-increment" value="5" min="0.5" step="0.5" required />
        </label>
        <div class="modal-actions">
          <button type="button" id="btn-cancel-modal" class="btn-secondary">Cancel</button>
          <button type="submit" class="btn-primary">Create</button>
        </div>
        <p id="modal-error" class="error" hidden></p>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
